<div class="home">

  <header class="home__header">
    <h1>CinéTrack</h1>
    <a class="home__search-link" routerLink="/search">Recherche serveur</a>
    <!-- <button class="home__logout" type="button" (click)="onLogout()">Se déconnecter</button> -->
  </header>

  @if (loading()) {
    <p class="home__status">Chargement des morceaux...</p>
  }
  @if (errorMessage()) {
    <p class="home__status home__status--error">{{ errorMessage() }}</p>
  }

  <div class="home__content">
    <app-track-form
      [trackToEdit]="selectedTrack()"
      (saveTrack)="onTrackSaved($event)"
    />

    <app-track-list
      [tracks]="tracks()"
      [selectedTrackId]="selectedTrackId"
      (trackSelected)="onTrackSelected($event)"
    />
  </div>

</div>
