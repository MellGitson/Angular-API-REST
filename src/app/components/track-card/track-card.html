<div
  class="track-card"
  [class.track-card--playing]="isPlaying()"
  [appHighlightFavorite]="track().favorite"
  [routerLink]="['/tracks', track().id]"
  (click)="onSelect()"
>

  <div class="track-card__cover-wrap">
    <img
      class="track-card__cover"
      [src]="track().coverUrl"
      [alt]="track().title"
    />
  </div>

  <div class="track-card__body">
    <h3 class="track-card__title">{{ track().title }}</h3>
    <p class="track-card__artist">{{ track().artist }}</p>
    <p class="track-card__meta">
      <span>{{ track().album }}</span>
      <span>{{ track().duration | durationFormat }}</span>
    </p>

    <div class="track-card__tags">
      <button
        type="button"
        class="track-card__tag track-card__tag--favorite"
        [class.track-card__tag--favorite-active]="track().favorite"
        (click)="onToggleFavorite($event)"
        [attr.aria-label]="track().favorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
        [attr.aria-pressed]="track().favorite"
      >{{ track().favorite ? '❤ Favori' : '♡ Favori' }}</button>

      @switch (true) {
        @case (track().rating >= 9) {
          <span class="track-card__tag track-card__tag--gold">⭐ Coup de coeur</span>
        }
        @case (track().rating >= 7) {
          <span class="track-card__tag">👍 Recommande</span>
        }
        @default {
          <span class="track-card__tag track-card__tag--muted">A decouvrir</span>
        }
      }
    </div>

    @if (isPlaying()) {
      <span class="track-card__badge">▶ En lecture</span>
    }

  </div>

</div>
