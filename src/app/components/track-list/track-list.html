<div class="track-list">

  <div class="track-list__search">
    <input
      class="track-list__search-input"
      type="search"
      placeholder="Rechercher un morceau…"
      [value]="searchTerm()"
      (input)="searchTerm.set($any($event.target).value)"
    />
    <select
      class="track-list__search-select"
      [value]="searchField()"
      (change)="searchField.set($any($event.target).value)"
    >
      <option value="all">Titre & artiste</option>
      <option value="title">Titre</option>
      <option value="artist">Artiste</option>
    </select>
  </div>

  <div class="track-list__cards">
    @for (track of filteredTracks(); track track.id) {
      <app-track-card [track]="track" (toggleFavorite)="onToggleFavorite($event)" />
    } @empty {
      @if (searchTerm()) {
        <p class="track-list__empty">Aucun résultat pour «&nbsp;{{ searchTerm() }}&nbsp;».</p>
      } @else {
        <p class="track-list__empty">Aucun morceau dans la bibliothèque.</p>
      }
    }
  </div>

</div>
