@if (toastVisible()) {
  <div class="toast">{{ toastMessage() }}</div>
}

<form class="track-form" (ngSubmit)="save()">
  <h2 class="track-form__title">
    @if (id()) {
      Modifier un morceau
    } @else {
      Ajouter un morceau
    }
  </h2>

  <label class="track-form__label" for="track-title">Titre</label>
  <input id="track-title" type="text" name="title" [ngModel]="title()" (ngModelChange)="title.set($event)" required />

  <label class="track-form__label" for="track-artist">Artiste</label>
  <input id="track-artist" type="text" name="artist" [ngModel]="artist()" (ngModelChange)="artist.set($event)" required />

  <label class="track-form__label" for="track-rating">Note (0-10)</label>
  <input id="track-rating" type="number" name="rating" [ngModel]="rating()" (ngModelChange)="rating.set($event)" min="0" max="10" required />

  <div class="track-form__actions">
    <button type="submit">Enregistrer</button>
  </div>
</form>
